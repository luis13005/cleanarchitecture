version: '3'
services:
  goapp:
    build: .
    working_dir: /app
    command: go run ./cmd/ordersystem
    ports:
      - "8080:8080"
      - "50051:50051"
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgresql:
    container_name: postgresql
    image: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: faculdade
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d faculdade"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.8.16-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
      - RABBITMQ_DEFAULTVHOST=/
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  migrate:
    image: migrate/migrate
    volumes:
      - ./sql/migrations:/migrations 
    command: -path=/migrations/ -database "postgres://admin:admin@postgresql:5432/faculdade?sslmode=disable" up
    depends_on:
      postgresql:
        condition: service_healthy
  
  evans:
    image: ghcr.io/ktr0731/evans:latest
    stdin_open: true 
    tty: true        
    volumes:
      - .:/mount:ro
    working_dir: /mount
    # Aqui usamos o nome do serviço 'goapp' em vez de host.docker.internal
    command: --path ./internal/infra/grpc/protofiles/ --proto order.proto --host goapp --port 50051 repl
    depends_on:
      - goapp